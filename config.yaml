database:
  duckdb_path: data/investment.duckdb

nas:
  source_root: /Volumes/agent/data-sources
  status_dir: /Volumes/agent/data-sources/status
  market_dir: /Volumes/agent/data-sources/market-mini
  duckdb_snapshot_dir: /Volumes/agent/data-sources/market-mini/duckdb-snapshots

arco:
  raw_dir: $HOME/brain/raw/sources/arco
  signals_path: signals.json
  beliefs_path: beliefs.json
  source_manifest_glob: source-manifest-*.json
  birdclaw_bookmarks_glob: birdclaw-bookmarks-*.json

market_data:
  # Online uses Yahoo chart for equities/ETFs and CoinGecko for configured
  # crypto majors, with explicit sample_fallback labels if a provider fails.
  mode: online
  lookback_days: 260
  equity_provider: yahoo-chart
  crypto_provider: coingecko
  user_agent: "joehu-market-panel/0.1 contact:local"

data_sources:
  opencli:
    enabled: true
    command: opencli
    timeout_seconds: 25
  tradingview:
    enabled: true
    # Empty means quote every configured equity/ETF and pull options for the
    # highest-scored symbols when the free-source job runs after a screen.
    options_symbols: []
    screener_limit: 50
    news_limit: 50
    strikes_around_spot: 6
  yfinance:
    enabled: true

analysis:
  enabled: true
  correlation_lookback_days: 180
  max_correlation_peers: 8

disclosures:
  # Add normalized public disclosure CSVs here to build scalable trader
  # replica portfolios. Expected columns include trader_name, symbol,
  # transaction_type, transaction_date, filed_date, amount_min/amount_max or
  # amount, and source_url.
  public_disclosure_csvs: []
  # Onboard new traders here. Run backfill_trader_disclosures once after adding
  # historical_csvs; daily_csvs are included in the scheduled disclosure refresh.
  tracked_traders: []
  13f_trackers:
    - name: Berkshire / Buffett
      cik: "0001067983"
      max_filings: 1
    - name: Scion / Burry
      cik: "0001649339"
      max_filings: 1
    - name: Bridgewater / Dalio
      cik: "0001350694"
      max_filings: 1
    - name: Renaissance / Simons-style
      cik: "0001037389"
      max_filings: 1
    - name: Point72
      cik: "0001603466"
      max_filings: 1

portfolio:
  csv_path:

watchlist:
  - symbol: SPY
    name: S&P 500 ETF
    asset_class: etf
    category: market
  - symbol: QQQ
    name: Nasdaq 100 ETF
    asset_class: etf
    category: market
  - symbol: NVDA
    name: NVIDIA
    asset_class: equity
    category: ai-infrastructure
    cik: "0001045810"
  - symbol: AMD
    name: AMD
    asset_class: equity
    category: ai-infrastructure
    cik: "0000002488"
  - symbol: COIN
    name: Coinbase
    asset_class: equity
    category: crypto-infrastructure
    cik: "0001679788"
  - symbol: BTC-USD
    name: Bitcoin
    asset_class: crypto
    category: crypto-major
  - symbol: TSLA
    name: Tesla
    asset_class: equity
    category: ai-robotics
    cik: "0001318605"
  - symbol: ETH-USD
    name: Ethereum
    asset_class: crypto
    category: crypto-major
  - symbol: SOL-USD
    name: Solana
    asset_class: crypto
    category: crypto-major

scoring:
  research_threshold: 75
  weights:
    technical: 0.25
    fundamental: 0.20
    category: 0.20
    thesis: 0.15
    trader: 0.10
    portfolio_fit: 0.10

trader_profile_dir: data/trader_profiles
prompt_dir: prompts
report_dir: data/reports
packet_dir: data/packets
