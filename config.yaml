database:
  duckdb_path: data/investment.duckdb

nas:
  source_root: /Volumes/agent/data-sources
  status_dir: /Volumes/agent/data-sources/status
  market_dir: /Volumes/agent/data-sources/market-mini
  duckdb_snapshot_dir: /Volumes/agent/data-sources/market-mini/duckdb-snapshots

arco:
  raw_dir: /Volumes/agent/brain/raw/sources/arco
  signals_path: signals.json
  beliefs_path: beliefs.json
  brief_beliefs_glob: brief-beliefs/brief-beliefs-*.json
  source_manifest_glob: source-manifest-*.json
  birdclaw_bookmarks_glob: birdclaw-bookmarks-*.json
  web_captures_glob: web-captures-*.json

market_data:
  # Online uses Yahoo chart for equities/ETFs and CoinGecko for configured
  # crypto majors. Provider failures are reported instead of replaced with
  # synthetic prices.
  mode: online
  lookback_days: 260
  equity_provider: yahoo-chart
  crypto_provider: coingecko
  user_agent: "joehu-market-panel/0.1 contact:local"

data_sources:
  opencli:
    enabled: true
    command: opencli
    timeout_seconds: 25
  tradingview:
    enabled: true
    # Empty means quote every configured equity/ETF and pull options for the
    # highest-scored symbols when the free-source job runs after a screen.
    options_symbols: []
    # Empty means resolve TradingView symbol search for the configured
    # watchlist plus the highest-scored symbols.
    search_symbols: []
    # Read-only personal TradingView surfaces. Failures are recorded as source
    # health/provider-run rows without blocking quote/options ingestion.
    personal_surfaces_enabled: true
    chart_state_enabled: true
    watchlist_colors:
      - red
      - orange
      - yellow
      - green
      - blue
      - purple
    alert_types:
      - active
      - triggered
      - offline
    screener_limit: 50
    news_limit: 50
    strikes_around_spot: 6
    # Broader 10x-radar source universe. The scanner takes the configured
    # watchlist plus the top ranked decision-queue symbols, then materializes
    # only candidates that pass deterministic option gates.
    option_scan_limit: 80
  yfinance:
    enabled: true
  brokers:
    enabled: true
    advisory_only: true
    ibkr:
      enabled: true
      host: 127.0.0.1
      port: 4002
      client_id: 77
      readonly: true
      paper_only: true
      stale_after_minutes: 15
      market_data_type: live_or_delayed
      quote_limit: 50
    robinhood:
      enabled: true
      # Read-only MCP market-data endpoint. The token itself must come from the
      # local OAuth cache or the named override environment variable; do not put
      # Robinhood credentials in config.
      mcp_url: https://agent.robinhood.com/mcp/trading
      token_path: ~/.config/market/robinhood-mcp-token.json
      auth_token_env: ROBINHOOD_MCP_TOKEN
      prefer_codex_credentials: true
      codex_credentials_path: ~/.codex/.credentials.json
      codex_mcp_server_name: robinhood-trading
      scope: internal
      callback_host: 127.0.0.1
      callback_port: 8765
      readonly: true
      timeout_seconds: 30
      max_symbols: 80
      max_expiries: 2
      strikes_around_spot: 12
      quote_batch_size: 20
      # Collect puts too: the watchlist option summary needs put quotes to compute
      # expected move (ATM call+put) and put/call IV skew. ~2x chain volume per scan.
      collect_puts: true
      # Also pull one ~monthly expiry (in addition to the LEAP radar expiries) so the
      # watchlist's Opt Move/Skew reflect a near-term horizon, not a 1-year LEAP. 0 disables.
      near_term_dte: 35
    moomoo:
      enabled: false
      host: 127.0.0.1
      port: 11111
      paper_only: true
      stale_after_minutes: 15
      scanner_limit: 50
    policy:
      require_account_for_recommendations: false
      max_trade_notional: 10000
      max_position_weight_pct: 20
      min_primary_evidence_count: 1
      min_total_evidence_count: 2
      earnings_blackout_days: 2

event_sources:
  # Official-source macro calendar rows used by /today's pre-open brief.
  enabled: true
  seed_requested_week: false
  bls_enabled: true
  dol_enabled: true
  federal_reserve_enabled: true
  treasury_enabled: true
  sec_enabled: true
  watchlist_enabled: true

analysis:
  enabled: true
  correlation_lookback_days: 180
  max_correlation_peers: 8

# Live opencli research ingestion (X/social, news, blogs). Cadence env knobs in
# app/scheduler.py: MARKET_SOCIAL_REFRESH_SECONDS (default 1800),
# MARKET_RESEARCH_REFRESH_SECONDS (default 3600); both honor 0 to disable.
research_sources:
  x:
    enabled: true
    list_id: '2066531259283656729'
    priority_handles:
    - balajis
    - karpathy
    - citrini
    - BillAckman
    - dylan522p
    - IncomeSharks
    limit: 30
    account_fetch_cap: 2
  news:
    enabled: true
    providers:
    - bloomberg
    - reuters
    - google-news
    - hackernews
    limit: 30
  blogs:
    enabled: true
    substack_urls:
    - https://blog.eladgil.com/?sort=new
    rss_urls:
    - https://www.ben-evans.com/benedictevans?format=rss
agents:
  option_thesis:
    enabled: false
    command: market-codex-option-thesis-agent
    timeout_seconds: 180
    limit: 8
  option_postmortem:
    enabled: false
    command: market-codex-option-postmortem-agent
    timeout_seconds: 180
    limit: 4
  option_agent:
    enabled: false
    command: market-codex-option-agent
    timeout_seconds: 180
    thesis_limit: 8
    postmortem_limit: 4
    provider: codex
    model: ''
    reasoning_effort: ''
    auto_run_seconds: 0
    max_runs_per_day: 1
    context_sources:
      fundamentals: true
      technicals: true
      ownership: true
      news: true
      social_signals: true
      catalysts: true
      portfolio: true
      decision: true
  pricing:
    default:
      input_per_1m: 1.25
      output_per_1m: 10.0
    gpt-5.2:
      input_per_1m: 1.25
      output_per_1m: 10.0
